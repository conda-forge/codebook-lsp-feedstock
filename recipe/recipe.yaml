context:
  version: "0.3.35"

package:
  name: codebook-lsp
  version: ${{ version }}

source:
  url: https://github.com/blopker/codebook/archive/refs/tags/v${{ version }}.zip
  sha256: 1bb9461ffb243bf4220ba0c454f0a5d6d5cafd6d3900d2e892bc43e38e54f1c3

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then: |
          export CFLAGS="${CFLAGS} -D_BSD_SOURCE"
          export AWS_LC_SYS_NO_JITTER_ENTROPY=1 # ref: https://github.com/aws/aws-lc-rs/issues/1008#issuecomment-3774105038
          cargo-bundle-licenses --format yaml --output ${SRC_DIR}/THIRDPARTY.yml
          cargo auditable install --locked --no-track --path ./crates/codebook-lsp --root ${PREFIX}
        else: |
          cargo-bundle-licenses --format yaml --output %SRC_DIR%\THIRDPARTY.yml
          cargo auditable install --locked --no-track --path .\crates\codebook-lsp --root %LIBRARY_PREFIX%

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - codebook-lsp --version

about:
  homepage: https://github.com/blopker/codebook
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  description: "Spell Checker for Code"
  summary: "Spell Checker for Code"

extra:
  recipe-maintainers:
    - VasanthakumarV
